<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD → NOTEBOOK</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0e1012;
  color: #e2e8f0;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  min-height: 100vh;
  padding: 2.5rem 2rem;
  max-width: 780px;
  margin: 0 auto;
}

/* HEADER */
.header { margin-bottom: 2rem; }

.header h1 {
  font-size: 1.1rem;
  font-weight: 700;
  color: #f0f4f8;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

.header p {
  font-size: 0.75rem;
  color: #6b7a8a;
  font-weight: 400;
}

/* DROP ZONE */
.drop-zone {
  border: 1.5px dashed #2a3540;
  border-radius: 10px;
  padding: 3.5rem 2rem;
  text-align: center;
  cursor: pointer;
  position: relative;
  background: #141a1f;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 1rem;
}

.drop-zone:hover, .drop-zone.drag-over {
  border-color: #3d8bcd;
  background: #141e28;
}

.drop-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}

.drop-icon {
  font-size: 2.2rem;
  font-weight: 700;
  color: #8a9bb0;
  margin-bottom: 1.25rem;
  letter-spacing: 0.1em;
}

.drop-main {
  font-size: 0.85rem;
  font-weight: 700;
  color: #c8d4e0;
  margin-bottom: 5px;
}

.drop-sub {
  font-size: 0.75rem;
  color: #4a5a6a;
}

/* FILE CHIP */
.file-chip {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: #141a1f;
  border: 1px solid #1e2d3a;
  border-radius: 8px;
  margin-bottom: 1rem;
}
.file-chip.visible { display: flex; }
.chip-tag {
  font-size: 10px;
  font-weight: 700;
  color: #58a6ff;
  background: rgba(88,166,255,0.1);
  border: 1px solid rgba(88,166,255,0.2);
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}
.chip-name { flex: 1; font-size: 12px; color: #c8d4e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chip-size { font-size: 11px; color: #4a5a6a; flex-shrink: 0; }
.chip-x { background: none; border: none; color: #4a5a6a; cursor: pointer; font-size: 16px; padding: 0 2px; transition: color 0.15s; }
.chip-x:hover { color: #ff6b6b; }

/* OPTIONS GRID */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1rem;
}

.opt-card {
  background: #141a1f;
  border: 1px solid #1e2d3a;
  border-radius: 8px;
  padding: 1rem 1.25rem;
}

.opt-key {
  font-size: 10px;
  font-weight: 700;
  color: #4a5a6a;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}

.opt-card input[type=text] {
  width: 100%;
  background: #0e1012;
  border: 1px solid #1e2d3a;
  border-radius: 6px;
  padding: 8px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #c8d4e0;
  outline: none;
  transition: border-color 0.15s;
}
.opt-card input[type=text]:focus { border-color: #3d8bcd; }
.opt-card input[type=text]::placeholder { color: #2e3d4a; }

.tog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.tog-row:last-child { margin-bottom: 0; }

.tog {
  appearance: none;
  width: 36px; height: 20px;
  border-radius: 10px;
  background: #1e2d3a;
  cursor: pointer;
  position: relative;
  transition: background 0.15s;
  flex-shrink: 0;
  border: none;
}
.tog:checked { background: #2563eb; }
.tog::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #4a5a6a;
  top: 3px; left: 3px;
  transition: left 0.15s, background 0.15s;
}
.tog:checked::after { left: 19px; background: #fff; }

.tog-label { font-size: 12px; color: #8a9bb0; }

/* CONVERT BTN */
.convert-btn {
  width: 100%;
  padding: 13px;
  background: #141a1f;
  border: 1px solid #2a3a4a;
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: #6b7a8a;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 1rem;
}
.convert-btn:hover:not(:disabled) { border-color: #3d8bcd; color: #c8d4e0; background: #141e28; }
.convert-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.convert-btn.ready { border-color: #2a3a4a; color: #c8d4e0; }
.convert-btn.running { border-color: #f59e0b; color: #f59e0b; }

/* LOG */
.log-panel {
  display: none;
  background: #0e1012;
  border: 1px solid #1e2d3a;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 1rem;
}
.log-panel.visible { display: block; }

.log-bar {
  background: #141a1f;
  border-bottom: 1px solid #1e2d3a;
  padding: 6px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.log-bar-label { font-size: 10px; color: #2e3d4a; text-transform: uppercase; letter-spacing: 0.1em; }
.log-dots { display: flex; gap: 5px; }
.log-dot { width: 8px; height: 8px; border-radius: 50%; }
.log-dot:nth-child(1) { background: #ff5f57; }
.log-dot:nth-child(2) { background: #ffbd2e; }
.log-dot:nth-child(3) { background: #28c840; }

.log-body {
  padding: 12px 14px;
  max-height: 160px;
  overflow-y: auto;
  font-size: 11px;
  line-height: 1.9;
}
.log-body::-webkit-scrollbar { width: 3px; }
.log-body::-webkit-scrollbar-thumb { background: #1e2d3a; }

.ll { color: #4a5a6a; }
.ll::before { content: '  '; }
.ll.ok { color: #28c840; }
.ll.ok::before { content: '✓ '; }
.ll.warn { color: #ffbd2e; }
.ll.warn::before { content: '! '; }
.ll.err { color: #ff5f57; }
.ll.err::before { content: '✗ '; }

/* RESULT */
.result-panel {
  display: none;
  background: #141a1f;
  border: 1px solid rgba(40,200,64,0.2);
  border-radius: 8px;
  overflow: hidden;
}
.result-panel.visible { display: block; }

.result-top {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #1e2d3a;
}
.res-icon {
  font-size: 10px;
  font-weight: 700;
  color: #28c840;
  background: rgba(40,200,64,0.08);
  border: 1px solid rgba(40,200,64,0.2);
  padding: 4px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}
.res-meta { flex: 1; }
.res-name { font-size: 12px; color: #c8d4e0; font-weight: 500; }
.res-info { font-size: 10px; color: #4a5a6a; margin-top: 1px; }
.dl-btn {
  padding: 7px 16px;
  background: #28c840;
  border: none;
  border-radius: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: #0e1012;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.15s;
}
.dl-btn:hover { background: #45d65a; }

.result-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid #1e2d3a;
}
.rs {
  padding: 12px;
  text-align: center;
  border-right: 1px solid #1e2d3a;
}
.rs:last-child { border-right: none; }
.rs-n { font-size: 1.5rem; font-weight: 700; color: #c8d4e0; line-height: 1; margin-bottom: 3px; }
.rs-l { font-size: 10px; color: #4a5a6a; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>

<div class="header">
  <h1>MD → NOTEBOOK</h1>
  <p>Convert structured lecture markdown to Colab-compatible .ipynb</p>
</div>

<div class="drop-zone" id="dropZone">
  <input type="file" id="fileInput" accept=".md,.markdown">
  <div class="drop-icon">[ .md ]</div>
  <div class="drop-main">Drop your markdown file here</div>
  <div class="drop-sub">or click to browse</div>
</div>

<div class="file-chip" id="fileChip">
  <span class="chip-tag">.md</span>
  <span class="chip-name" id="chipName"></span>
  <span class="chip-size" id="chipSize"></span>
  <button class="chip-x" id="chipX">×</button>
</div>

<div class="options-grid">
  <div class="opt-card">
    <div class="opt-key">Output Filename</div>
    <input type="text" id="outName" placeholder="auto (input_generated.ipynb)">
  </div>
  <div class="opt-card">
    <div class="opt-key">Quiz Cards</div>
    <div class="tog-row">
      <input type="checkbox" class="tog" id="skipQuiz" checked>
      <span class="tog-label" id="quizLabel">Skip quiz_card sections</span>
    </div>
    <div class="tog-row">
      <input type="checkbox" class="tog" id="stripNotes" checked>
      <span class="tog-label">Strip instructor notes</span>
    </div>
  </div>
</div>

<button class="convert-btn" id="convertBtn" disabled>convert to notebook</button>

<div class="log-panel" id="logPanel">
  <div class="log-bar">
    <span class="log-bar-label">output</span>
    <div class="log-dots">
      <div class="log-dot"></div><div class="log-dot"></div><div class="log-dot"></div>
    </div>
  </div>
  <div class="log-body" id="logBody"></div>
</div>

<div class="result-panel" id="resultPanel">
  <div class="result-top">
    <div class="res-icon">.ipynb</div>
    <div class="res-meta">
      <div class="res-name" id="resName"></div>
      <div class="res-info" id="resInfo"></div>
    </div>
    <button class="dl-btn" id="dlBtn">↓ Download</button>
  </div>
  <div class="result-stats">
    <div class="rs"><div class="rs-n" id="rsTotal">0</div><div class="rs-l">Total Cells</div></div>
    <div class="rs"><div class="rs-n" id="rsCode">0</div><div class="rs-l">Code Cells</div></div>
    <div class="rs"><div class="rs-n" id="rsMd">0</div><div class="rs-l">Markdown</div></div>
  </div>
</div>

<script>
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),
fileChip=document.getElementById('fileChip'),chipName=document.getElementById('chipName'),
chipSize=document.getElementById('chipSize'),chipX=document.getElementById('chipX'),
convertBtn=document.getElementById('convertBtn'),logPanel=document.getElementById('logPanel'),
logBody=document.getElementById('logBody'),resultPanel=document.getElementById('resultPanel'),
resName=document.getElementById('resName'),resInfo=document.getElementById('resInfo'),
dlBtn=document.getElementById('dlBtn'),skipQuiz=document.getElementById('skipQuiz'),
stripNotes=document.getElementById('stripNotes'),outName=document.getElementById('outName');

let currentFile=null,notebookBlob=null,outputFilename='';

function fmt(b){return b<1024?b+' B':(b/1024).toFixed(1)+' KB';}
function log(msg,type=''){
  logPanel.classList.add('visible');
  const d=document.createElement('div');d.className='ll '+type;d.textContent=msg;
  logBody.appendChild(d);logBody.scrollTop=logBody.scrollHeight;
}
function clearLog(){logBody.innerHTML='';logPanel.classList.remove('visible');}

function setFile(file){
  if(!file||!file.name.match(/\.(md|markdown)$/i)){log('Only .md/.markdown files supported','err');logPanel.classList.add('visible');return;}
  currentFile=file;chipName.textContent=file.name;chipSize.textContent=fmt(file.size);
  fileChip.classList.add('visible');convertBtn.disabled=false;convertBtn.classList.add('ready');
  resultPanel.classList.remove('visible');clearLog();log('Loaded: '+file.name,'ok');
  outName.placeholder=file.name.replace(/\.(md|markdown)$/i,'_generated.ipynb');
}

dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');if(e.dataTransfer.files[0])setFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',e=>{if(e.target.files[0])setFile(e.target.files[0]);});
chipX.addEventListener('click',()=>{currentFile=null;fileChip.classList.remove('visible');convertBtn.disabled=true;convertBtn.classList.remove('ready');fileInput.value='';clearLog();resultPanel.classList.remove('visible');});
skipQuiz.addEventListener('change',()=>{document.getElementById('quizLabel').textContent=skipQuiz.checked?'Skip quiz_card sections':'Include quiz_card sections';});

function makeId(){return Math.random().toString(36).slice(2,10);}
function toLines(t){const l=t.split('\n').map(x=>x+'\n');if(l.length)l[l.length-1]=l[l.length-1].replace(/\n$/,'');return l;}
function mdCell(s){return{cell_type:'markdown',source:toLines(s),metadata:{id:makeId()}};}
function codeCell(s){return{cell_type:'code',source:toLines(s),metadata:{id:makeId()},execution_count:null,outputs:[]};}
const CODE=new Set(['python','py','python3']),OUT=new Set(['bash','sh','shell','console','output','text','plaintext','plain','']);
function classifyFence(line){let l=line.replace(/^`+/,'').replace(/[=!]+$/,'').toLowerCase().trim();if(CODE.has(l))return'code';if(OUT.has(l))return'output';return'skip';}
function stripNotesFn(t){return t.replace(/<span[^>]*>\s*\*\*\[(?:Note to Instructor|Ask Learners)\][^<]*\*\*\s*<\/span>\s*\n?(?:>.*\n?)*/g,'').trim();}
function parseFM(block){const fm={},lines=block.replace(/^\n/,'').split('\n');let bs=0;for(let i=0;i<lines.length;i++){const m=lines[i].match(/^(\w+):\s*(.*)/);if(m){fm[m[1]]=m[2].trim();bs=i+1;}else break;}return{fm,body:lines.slice(bs).join('\n').trim()};}
function bodyToCells(body,doStrip){
  const cells=[];let state='text',buf=[];
  function flush(){const c=buf.join('\n').trim();buf=[];if(!c)return;
    if(state==='text'){const x=doStrip?stripNotesFn(c):c;if(x)cells.push(mdCell(x));}
    else if(state==='code')cells.push(codeCell(c));
    // state === 'output' and state === 'skip': silently drop
  }
  for(const line of body.split('\n')){
    if(state==='text'&&/^```/.test(line)){flush();state=classifyFence(line);continue;}
    if(state!=='text'&&/^```\s*$/.test(line)){flush();state='text';continue;}
    buf.push(line);}
  if(state==='text')flush();return cells;
}
function convertMd(text){
  const secs=text.split(/\n---\n/),title=secs[0].trim().replace(/^#+\s*/,'');
  const cells=[mdCell('# '+title)];let skipped=0;
  for(const raw of secs.slice(1)){
    const{fm,body}=parseFM(raw);
    if(skipQuiz.checked&&(fm.card_type||'cue_card')==='quiz_card'){skipped++;continue;}
    if(!body.trim())continue;
    if(fm.title)cells.push(mdCell('## '+fm.title));
    cells.push(...bodyToCells(body,stripNotes.checked));
  }
  return{cells,skipped};
}

convertBtn.addEventListener('click',async()=>{
  if(!currentFile)return;
  clearLog();convertBtn.disabled=true;convertBtn.classList.add('running');convertBtn.textContent='converting…';
  resultPanel.classList.remove('visible');
  log('Reading '+currentFile.name+' ('+fmt(currentFile.size)+')');
  const text=await currentFile.text();
  log('Parsed '+text.split('\n').length+' lines');
  await new Promise(r=>setTimeout(r,60));
  const secs=(text.match(/\n---\n/g)||[]).length+1;
  log('Found '+secs+' section(s)');
  await new Promise(r=>setTimeout(r,60));
  const{cells,skipped}=convertMd(text);
  const cc=cells.filter(c=>c.cell_type==='code').length,mc=cells.filter(c=>c.cell_type==='markdown').length;
  if(skipped>0)log('Skipped '+skipped+' quiz_card(s)','warn');
  log('Generated '+cells.length+' cells ('+cc+' code · '+mc+' markdown)','ok');
  const nb={nbformat:4,nbformat_minor:0,metadata:{colab:{provenance:[]},kernelspec:{name:'python3',display_name:'Python 3'},language_info:{name:'python'}},cells};
  notebookBlob=new Blob([JSON.stringify(nb,null,2)],{type:'application/json'});
  const sug=outName.value.trim()||outName.placeholder||currentFile.name.replace(/\.(md|markdown)$/i,'_generated.ipynb');
  outputFilename=sug.endsWith('.ipynb')?sug:sug+'.ipynb';
  resName.textContent=outputFilename;resInfo.textContent=cells.length+' cells · '+fmt(notebookBlob.size)+' · nbformat 4.0';
  document.getElementById('rsTotal').textContent=cells.length;
  document.getElementById('rsCode').textContent=cc;
  document.getElementById('rsMd').textContent=mc;
  resultPanel.classList.add('visible');
  log('Ready → '+outputFilename,'ok');
  convertBtn.classList.remove('running');convertBtn.textContent='convert to notebook';
  convertBtn.disabled=false;convertBtn.classList.add('ready');
});

dlBtn.addEventListener('click',()=>{
  if(!notebookBlob)return;
  const a=document.createElement('a');a.href=URL.createObjectURL(notebookBlob);a.download=outputFilename;a.click();URL.revokeObjectURL(a.href);
  log('Downloaded: '+outputFilename,'ok');
});
</script>
</body>
</html>
